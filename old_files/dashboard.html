<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>d5hive</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0e0e0e; color: #e8e8e8; font-family: 'IBM Plex Sans', sans-serif; font-size: 14px; padding: 32px 28px; }

  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
  .logo { font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 500; color: #4ade80; }
  .logo span { color: #555; font-weight: 400; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; display: inline-block; margin-right: 6px; }
  .dot.off { background: #f87171; animation: none; }
  .host { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #555; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .pipeline { background: #161616; border: 1px solid #2a2a2a; border-radius: 8px; padding: 20px; margin-bottom: 12px; }
  .pipeline.running { border-color: #fbbf24; }
  .pipeline.done    { border-color: #4ade80; }
  .pipeline.error   { border-color: #f87171; }

  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .pname { font-weight: 500; font-size: 15px; flex: 1; }
  .pdesc { font-size: 12px; color: #666; margin-top: 2px; }

  .badge { font-family: 'IBM Plex Mono', monospace; font-size: 10px; padding: 3px 8px; border-radius: 3px; }
  .badge-idle   { background: #1f1f1f; color: #555;    border: 1px solid #2a2a2a; }
  .badge-running{ background: #3a2e0a; color: #fbbf24; border: 1px solid #fbbf24; }
  .badge-ok     { background: #1a3a26; color: #4ade80; border: 1px solid #4ade80; }
  .badge-error  { background: #3a1a1a; color: #f87171; border: 1px solid #f87171; }

  .btn { font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 7px 16px; border-radius: 4px; border: 1px solid #4ade80; background: transparent; color: #4ade80; cursor: pointer; transition: all 0.15s; }
  .btn:hover { background: #1a3a26; }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn:disabled:hover { background: transparent; }
  .btn-plain { border-color: #333; color: #555; }
  .btn-plain:hover { border-color: #555; color: #888; background: transparent; }

  .log { background: #0a0a0a; border: 1px solid #1f1f1f; border-radius: 4px; padding: 12px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #666; min-height: 80px; max-height: 260px; overflow-y: auto; line-height: 1.7; }
  .log-line { display: block; }
  .ok  { color: #4ade80; }
  .err { color: #f87171; }
  .inf { color: #60a5fa; }
  .dim { color: #444; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 10px; height: 10px; border: 1.5px solid #333; border-top-color: #fbbf24; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 4px; }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">d5<span>hive</span></div>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="dot" id="dot"></span>
    <span class="host" id="host-label">connecting...</span>
  </div>
</div>

<div class="pipeline" id="card-gtfs">
  <div class="row">
    <div>
      <div class="pname">JB_GTFS</div>
      <div class="pdesc">Metro do Porto · GTFS</div>
    </div>
    <span class="badge badge-idle" id="badge-gtfs">idle</span>
    <span style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#444" id="time-gtfs"></span>
    <button class="btn" id="btn-gtfs" onclick="run('gtfs', '/jb_gtfs')">▶ run</button>
    <button class="btn btn-plain" onclick="clearLog('gtfs')">clear</button>
  </div>
  <div class="log" id="log-gtfs">— no output yet —</div>
</div>

<script>
function ts() { return new Date().toLocaleTimeString('en-GB'); }

function log(id, text, cls) {
  const box = document.getElementById('log-' + id);
  if (box.textContent === '— no output yet —') box.textContent = '';
  text.split('\n').forEach(line => {
    if (!line.trim()) return;
    const el = document.createElement('span');
    el.className = 'log-line ' + (cls || '');
    el.textContent = '[' + ts() + '] ' + line;
    box.appendChild(el);
    box.appendChild(document.createElement('br'));
  });
  box.scrollTop = box.scrollHeight;
}

function clearLog(id) { document.getElementById('log-' + id).textContent = '— no output yet —'; }

function badge(id, state) {
  document.getElementById('badge-' + id).className = 'badge badge-' + state;
  document.getElementById('badge-' + id).textContent = state;
  document.getElementById('card-' + id).className = 'pipeline ' + (state === 'ok' ? 'done' : state === 'idle' ? '' : state);
}

function run(id, endpoint) {
  const btn = document.getElementById('btn-' + id);
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>running';
  badge(id, 'running');
  log(id, 'triggering ' + endpoint + '...', 'inf');
  const t0 = Date.now();

  fetch(endpoint, { method: 'POST' })
    .then(r => r.json())
    .then(d => {
      const elapsed = ((Date.now() - t0) / 1000).toFixed(1) + 's';
      document.getElementById('time-' + id).textContent = elapsed;

      if (d.status === 'started') {
        badge(id, 'ok');
        log(id, 'launched · pid ' + d.pid, 'ok');
        log(id, 'running in background — check server logs for full output', 'dim');
      } else if (d.status === 'completed') {
        badge(id, 'ok');
        log(id, 'completed in ' + elapsed, 'ok');
        if (d.stdout) log(id, d.stdout.slice(-1500));
      } else {
        badge(id, 'error');
        log(id, 'error: ' + (d.error || d.stderr || JSON.stringify(d)), 'err');
      }
      btn.disabled = false;
      btn.innerHTML = '▶ run';
    })
    .catch(e => {
      badge(id, 'error');
      log(id, 'request failed: ' + e, 'err');
      btn.disabled = false;
      btn.innerHTML = '▶ run';
    });
}

fetch('/')
  .then(r => r.json())
  .then(d => {
    document.getElementById('host-label').textContent = (d.env || '') + ' · ' + (d.host || '').slice(0, 30);
    document.getElementById('dot').className = 'dot';
  })
  .catch(() => {
    document.getElementById('host-label').textContent = 'offline';
    document.getElementById('dot').className = 'dot off';
  });
</script>
</body>
</html>
